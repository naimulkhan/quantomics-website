<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QuantOmics — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #06080f;
      color: #e8eaf0;
      padding: 2rem;
    }

    .card {
      text-align: center;
      max-width: 560px;
      width: 100%;
    }

    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7eb3ff;
      background: rgba(126, 179, 255, 0.1);
      border: 1px solid rgba(126, 179, 255, 0.25);
      border-radius: 999px;
      padding: 0.3rem 0.85rem;
      margin-bottom: 1.75rem;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff 0%, #7eb3ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .tagline {
      font-size: 1rem;
      color: #8a94b0;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, #1565c0, #7eb3ff);
      border-radius: 2px;
      margin: 0 auto 2.5rem;
    }

    .detail {
      font-size: 0.85rem;
      color: #555e7a;
      line-height: 1.6;
    }

    .detail strong {
      color: #7eb3ff;
      font-weight: 500;
    }

    footer {
      margin-top: 3.5rem;
      font-size: 0.75rem;
      color: #333b55;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">NSERC CREATE Program</div>
    <h1>QuantOmics</h1>
    <p class="tagline">
      AI-Driven Quantum Sensing &amp; Genomics<br>for Precision Therapeutics
    </p>
    <div class="divider"></div>
    <p class="detail">
      A consortium of six Canadian universities training<br>
      the next generation of interdisciplinary researchers.<br><br>
      <strong>Website launching soon.</strong>
    </p>
  </div>
  <footer>Toronto Metropolitan University &mdash; quantomics.ca</footer>
</body>
</html>
