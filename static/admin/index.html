<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>QuantOmics CMS | Content Manager</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Explicitly point the identity widget at your Netlify site URL.
    // This fixes "Failed to load settings from /.netlify/identity"
    // when the invite link redirects to the wrong origin.
    if (window.netlifyIdentity) {
      window.netlifyIdentity.init({
        APIUrl: "https://quantomics.netlify.app/.netlify/identity"
      });
    }
  </script>
</body>
</html>
