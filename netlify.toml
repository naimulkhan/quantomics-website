[build]
  command = "hugo --gc --minify"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.136.5"
  HUGO_ENVIRONMENT = "production"
  HUGO_ENABLEGITINFO = "true"
  GO_VERSION = "1.21"

[context.deploy-preview]
  command = "hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

# ── COMING SOON MODE ──────────────────────────────────────────────────────────
# To go live: delete the two [[redirects]] blocks below (keep the /admin/ one).
# ──────────────────────────────────────────────────────────────────────────────

# Allow CMS access even while site is under embargo
[[redirects]]
  from = "/admin/*"
  to   = "/admin/:splat"
  status = 200

# Rewrite everything else to the coming-soon splash page
[[redirects]]
  from  = "/*"
  to    = "/coming-soon.html"
  status = 200
  force = true

# Redirect for Decap CMS OAuth via Netlify Identity
[[redirects]]
  from = "/admin/"
  to = "/admin/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "frame-ancestors 'none'"
